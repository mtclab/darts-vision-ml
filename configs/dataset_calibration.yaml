# Board calibration: 4 calibration keypoints only
# Generated by download_and_convert.py — paths are relative to this file
path: ../data/processed/board_calibration
train: images/train
val: images/val
test: images/test

# Keypoint definitions (calibration corners)
# 0: double-20 corner (top center)
# 1: double-6 corner (right)
# 2: double-3 corner (bottom)
# 3: double-11 corner (left)

kpt_shape: [4, 3]  # 4 keypoints, each with (x, y, visibility)

names:
  0: dartboard